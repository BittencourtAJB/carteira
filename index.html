<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>Sistema</title>

  <style>
    html, body {
      margin: 0;
      padding: 0;
      height: 100%;
      overflow: hidden;
    }

    #container {
      position: relative;
      width: 100%;
      height: 100%;
    }

    iframe {
      border: none;
      width: 100%;
      height: 100%;
    }

    /* Loader */
    #loader {
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      border: 6px solid #f3f3f3;
      border-top: 6px solid #3498db;
      border-radius: 50%;
      width: 50px;
      height: 50px;
      animation: spin 1s linear infinite;
      z-index: 10;
    }

    @keyframes spin {
      0% { transform: translate(-50%, -50%) rotate(0deg); }
      100% { transform: translate(-50%, -50%) rotate(360deg); }
    }
  </style>
</head>

<body>

<div id="container">
  
  <!-- Loader -->
  <div id="loader"></div>

  <!-- Iframe -->
 <iframe 
  src="https://script.google.com/macros/s/AKfycbwZnyN-qG5vClvUH0CZXFvqx7vhrDS_fwYjWQjPnbgFiycxsr3e2WkJjL8czs1ouuKY7Q/exec?cod=1"
  onload="document.getElementById('loader').style.display='none'"
  sandbox="allow-forms scroll-allow-popups allow-popups-to-escape-sandbox allow-same-origin allow-scripts allow-top-navigation"
  style="border: none; width: 100%; height: 100%;">
</iframe>

</div>

</body>
</html>
