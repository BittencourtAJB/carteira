<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
  <title>Sistema</title>

  <style>
    html, body {
      margin: 0;
      padding: 0;
      height: 100%;
      overflow: hidden;
    }

    #container {
      position: relative;
      width: 100%;
      height: 100%;
    }

    iframe {
      border: none;
      width: 100%;
      height: 100%;
      /* Garante que o iframe receba eventos de toque */
      pointer-events: auto;
    }

    /* Loader */
    #loader {
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      border: 6px solid #f3f3f3;
      border-top: 6px solid #3498db;
      border-radius: 50%;
      width: 50px;
      height: 50px;
      animation: spin 1s linear infinite;
      z-index: 10;
    }

    @keyframes spin {
      0% { transform: translate(-50%, -50%) rotate(0deg); }
      100% { transform: translate(-50%, -50%) rotate(360deg); }
    }
  </style>
</head>
<body>

<div id="container">
  <!-- Loader -->
  <div id="loader"></div>

  <!-- Iframe com permissões e atributo allow -->
  <iframe 
    src="https://script.google.com/macros/s/AKfycbwZnyN-qG5vClvUH0CZXFvqx7vhrDS_fwYjWQjPnbgFiycxsr3e2WkJjL8czs1ouuKY7Q/exec?cod=1"
    onload="document.getElementById('loader').style.display='none'"
    allow="fullscreen; autoplay; *">
  </iframe>
</div>

<script>
  // Escuta mensagens postMessage vindas do iframe (para redirecionamento)
  window.addEventListener('message', function(event) {
    // Verifica a origem da mensagem para segurança (use o domínio exato do GAS)
    if (event.origin === 'https://script.google.com') {
      if (event.data && event.data.action === 'redirect') {
        // Redireciona a página principal (top) para a URL informada
        window.top.location.href = event.data.url;
      }
    }
  });
</script>

</body>
</html>
